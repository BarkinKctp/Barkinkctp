name: Generate terminal GIF

on:
  schedule:
    - cron: "0 7 * * *" # Runs at 10:00 AM UTC + 3 every day (Istanbul time)
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Generate terminal GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: Commit and push output.gif
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.gif
          git diff --cached --quiet || git commit -m "chore: update terminal GIF [skip ci]"
          git push